<svg viewBox="0 0 500 500" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9F1C" />
      <stop offset="50%" stop-color="#FFBF69" />
      <stop offset="100%" stop-color="#E71D36" />
    </linearGradient>
    
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2EC4B6" />
      <stop offset="100%" stop-color="#011627" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="500" height="500" fill="#F8F9FA" rx="60" />

  <g stroke="#DEE2E6" stroke-width="2" stroke-dasharray="8 8">
    <line x1="250" y1="150" x2="120" y2="280" />
    <line x1="250" y1="150" x2="380" y2="280" />
    <line x1="120" y1="280" x2="380" y2="280" />
    <line x1="250" y1="150" x2="250" y2="50" />
  </g>

  <path d="M 50 350 C 150 350, 180 180, 250 180 C 320 180, 350 320, 450 320" 
        fill="none" 
        stroke="url(#waveGradient)" 
        stroke-width="16" 
        stroke-linecap="round" 
        filter="url(#shadow)" />

  <circle cx="120" cy="280" r="24" fill="#011627" />
  <circle cx="380" cy="280" r="24" fill="#011627" />
  
  <circle cx="250" cy="150" r="45" fill="url(#nodeGradient)" stroke="#FFFFFF" stroke-width="6" filter="url(#shadow)" />
  <circle cx="250" cy="150" r="18" fill="#FFFFFF" opacity="0.2" />

  <g transform="translate(205, 95)" filter="url(#shadow)">
    <circle cx="20" cy="20" r="22" fill="#E71D36" stroke="#FFFFFF" stroke-width="4" />
    <text x="20" y="27" font-family="'Segoe UI', Helvetica, sans-serif" font-weight="bold" font-size="22" fill="#FFFFFF" text-anchor="middle">P</text>
  </g>
  
  <g transform="translate(390, 240)">
    <circle cx="12" cy="12" r="14" fill="#FF9F1C" stroke="#FFFFFF" stroke-width="3" />
    <text x="12" y="17" font-family="'Segoe UI', Helvetica, sans-serif" font-weight="bold" font-size="14" fill="#FFFFFF" text-anchor="middle">P</text>
  </g>

  <text x="250" y="440" font-family="'Segoe UI', Helvetica, sans-serif" font-weight="900" font-size="38" fill="#011627" text-anchor="middle" letter-spacing="1.5">
    PhosKin<tspan fill="#2EC4B6">Time</tspan>
  </text>
  <text x="250" y="465" font-family="'Segoe UI', Helvetica, sans-serif" font-weight="600" font-size="14" fill="#6C757D" text-anchor="middle" letter-spacing="3">
    NETWORK DYNAMICS TOOLKIT
  </text>
</svg>
